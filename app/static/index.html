<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f2937" />
  <title>Voice Diary</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Voice Diary" />
  <link rel="stylesheet" href="/style.css?v=8" />
</head>
<body>
  <header>
    <h1>🎙️ Voice Diary</h1>
    <p class="subtitle">Speak → transcribe → store. Local-only.</p>
    <div class="header-controls">
      <div class="mode-toggle" role="tablist">
        <button id="mode-quick" class="mode-btn active" role="tab" aria-selected="true">📝 Quick</button>
        <button id="mode-chat" class="mode-btn" role="tab" aria-selected="false">💬 Chat</button>
        <button id="mode-diary" class="mode-btn" role="tab" aria-selected="false">📖 Diary</button>
      </div>
      <label class="lang-select">
        🌐
        <select id="lang-select">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
        </select>
      </label>
    </div>
  </header>

  <main>
    <!-- ====================================================================
         Quick mode (Phase 1)
         ==================================================================== -->
    <section id="quick-panel" class="mode-panel">
      <div class="recorder">
        <button id="mic-btn" class="mic-btn" aria-label="Start recording">
          <span class="mic-icon">🎤</span>
          <span class="mic-label">Tap to record</span>
        </button>
        <p id="mic-status" class="mic-status" aria-live="polite">Ready</p>
        <p id="stt-lang" class="stt-lang">识别语言: <span id="stt-lang-value">—</span></p>
      </div>

      <div class="transcript">
        <label for="transcript" class="label">Transcript (editable)</label>
        <textarea
          id="transcript"
          rows="4"
          placeholder="Speak, or type here. Edit before saving."
        ></textarea>
        <div class="actions">
          <button id="save-btn" class="primary">💾 Save entry</button>
          <button id="clear-btn" class="secondary">🗑️ Clear</button>
        </div>
      </div>

      <div class="history">
        <h2>History</h2>
        <p id="history-empty" class="empty">No entries yet. Record one above.</p>
        <div id="history-list"></div>
      </div>
    </section>

    <!-- ====================================================================
         Chat mode (Phase 2 + Phase 3 RAG)
         ==================================================================== -->
    <section id="chat-panel" class="mode-panel" hidden>
      <div class="chat-header">
        <button id="chat-new" class="secondary" title="Start a new conversation">🆕 New</button>
        <span id="chat-status" class="chat-status">No active conversation</span>
        <label class="memory-toggle" title="When on, the assistant can recall your past diary entries to answer questions">
          <input type="checkbox" id="memory-mode" />
          <span>🧠 Memory</span>
        </label>
        <button id="chat-end" class="primary" title="End & save as diary entry" disabled>💾 End & save</button>
      </div>

      <div id="chat-thread" class="chat-thread" aria-live="polite">
        <p class="chat-placeholder">Click <strong>🆕 New</strong> to start a conversation.</p>
      </div>

      <div id="extracted-panel" class="extracted-panel" hidden>
        <h3>Extracted from this session</h3>
        <dl id="extracted-fields"></dl>
      </div>

      <div class="chat-input">
        <button id="chat-mic" class="mic-btn-small" aria-label="Record" disabled>🎤</button>
        <textarea
          id="chat-input"
          rows="2"
          placeholder="Type a message, or click the mic to speak..."
          disabled
        ></textarea>
        <button id="chat-send" class="primary send-btn" disabled>➤</button>
      </div>
      <p class="stt-lang">聊天识别语言: <span id="chat-stt-lang-value">—</span></p>
    </section>

    <!-- ====================================================================
         Diary mode (Phase 3) — journal layout, grouped by date
         ==================================================================== -->
    <section id="diary-panel" class="mode-panel" hidden>
      <div class="diary-toolbar">
        <h2>📖 Diary</h2>
        <div class="diary-filters">
          <input id="diary-search" type="search" placeholder="Search your diary…" />
          <button id="diary-refresh" class="secondary" title="Refresh">🔄</button>
          <button id="diary-export" class="secondary" title="Download all entries as Markdown">📥 Export</button>
          <button id="diary-import" class="secondary" title="Import a Markdown file">📤 Import</button>
          <input id="diary-import-file" type="file" accept=".md,text/markdown,text/plain" hidden />
        </div>
      </div>
      <p id="diary-empty" class="empty">No entries yet.</p>
      <div id="diary-list"></div>
    </section>
  </main>

  <script src="/app.js?v=8"></script>
  <script>
    // Register service worker for offline-capable PWA shell
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW reg failed:', err));
      });
    }
  </script>
</body>
</html>
